    WebhookEvent:
      title: WebhookEvent
      description: >-
        Discriminated union of every v2 webhook event. Switch on `type` to
        narrow to a specific event shape.
      oneOf:
        - $ref: '#/components/schemas/AuthorBlockedEvent'
        - $ref: '#/components/schemas/AuthorUnblockedEvent'
        - $ref: '#/components/schemas/AuthorSuspendedEvent'
        - $ref: '#/components/schemas/AuthorUpdatedEvent'
        - $ref: '#/components/schemas/AuthorTrustLevelChangedEvent'
        - $ref: '#/components/schemas/AuthorActionEvent'
        - $ref: '#/components/schemas/QueueItemCompletedEvent'
        - $ref: '#/components/schemas/QueueItemActionEvent'
        - $ref: '#/components/schemas/QueueItemRejectedEvent'
        - $ref: '#/components/schemas/QueueItemAllowedEvent'
      discriminator:
        propertyName: type
        mapping:
          author.blocked: '#/components/schemas/AuthorBlockedEvent'
          author.unblocked: '#/components/schemas/AuthorUnblockedEvent'
          author.suspended: '#/components/schemas/AuthorSuspendedEvent'
          author.updated: '#/components/schemas/AuthorUpdatedEvent'
          author.trust_level_changed: '#/components/schemas/AuthorTrustLevelChangedEvent'
          author.action: '#/components/schemas/AuthorActionEvent'
          queue_item.resolved: '#/components/schemas/QueueItemCompletedEvent'
          queue_item.action: '#/components/schemas/QueueItemActionEvent'
          queue_item.rejected: '#/components/schemas/QueueItemRejectedEvent'
          queue_item.allowed: '#/components/schemas/QueueItemAllowedEvent'
  securitySchemes:
    Authorization:
      type: http
      scheme: bearer
webhooks:
  author.blocked:
    post:
      summary: Author was permanently blocked
      description: >-
        Fired when an author transitions to the `blocked` status. The
        `data.object` is the action_performed record that drove the transition,
        with the author and triggering action nested as inline resources.
      tags:
        - Webhooks
      parameters:
        - in: header
          name: webhook-version
          required: true
          schema:
            type: string
            enum:
              - v2
          description: Payload envelope version. Always `v2` for events documented here.
        - in: header
          name: webhook-event-id
          required: true
          schema:
            type: string
          description: Stable event ID (matches `id` in the body). Use to dedupe retries.
        - in: header
          name: modapi-signature
          required: false
          schema:
            type: string
          description: >-
            HMAC-SHA256 signature of the raw request body, signed with the
            webhook secret. Verify before trusting the payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorBlockedEvent'
      responses:
        '200':
          description: >-
            Acknowledge receipt. Any 2xx status closes the delivery as
            successful; non-2xx triggers retry with exponential backoff.
  author.unblocked:
    post:
      summary: Author was unblocked
      description: >-
        Fired when an author transitions back to the `enabled` status. May fire
        automatically when a temporary suspension expires (the auto-unblock
        worker runs the `AUTHOR_UNBLOCK` action).
      tags:
        - Webhooks
      parameters:
        - in: header
          name: webhook-version
          required: true
          schema:
            type: string
            enum:
              - v2
          description: Payload envelope version. Always `v2` for events documented here.
        - in: header
          name: webhook-event-id
          required: true
          schema:
            type: string
          description: Stable event ID (matches `id` in the body). Use to dedupe retries.
        - in: header
          name: modapi-signature
          required: false
          schema:
            type: string
          description: >-
            HMAC-SHA256 signature of the raw request body, signed with the
            webhook secret. Verify before trusting the payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorUnblockedEvent'
      responses:
        '200':
          description: >-
            Acknowledge receipt. Any 2xx status closes the delivery as
            successful; non-2xx triggers retry with exponential backoff.
  author.suspended:
    post:
      summary: Author was temporarily suspended
      description: >-
        Fired when an author is suspended for a finite period. The `block.until`
        field on the nested author indicates when the suspension expires.
      tags:
        - Webhooks
      parameters:
        - in: header
          name: webhook-version
          required: true
