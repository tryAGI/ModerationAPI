                                            A public URL of the image content.
                                            Either url or data must be provided.
                                          type: string
                                          format: uri
                                        data:
                                          description: >-
                                            Base64-encoded image data. Either url or
                                            data must be provided. Note: base64
                                            images are not stored and will not
                                            appear in the review queue.
                                          type: string
                                          maxLength: 5500000
                                      required:
                                        - type
                                      additionalProperties: false
                                      description: Image
                                      title: Image
                                    - type: object
                                      properties:
                                        type:
                                          type: string
                                          const: video
                                        url:
                                          type: string
                                          format: uri
                                          description: A public URL of the video content
                                      required:
                                        - type
                                        - url
                                      additionalProperties: false
                                      description: Video
                                      title: Video
                                    - type: object
                                      properties:
                                        type:
                                          type: string
                                          const: audio
                                        url:
                                          type: string
                                          format: uri
                                          description: The URL of the audio content
                                      required:
                                        - type
                                        - url
                                      additionalProperties: false
                                      description: Audio
                                      title: Audio
                                  title: Content leaf
                                  type: object
                                title: Modified nested object content
                          - type: 'null'
                        description: The modified content, if any.
                      transcript:
                        description: >-
                          The transcribed text from audio content. Only present
                          when audio moderation is used and transcript inclusion
                          is enabled on the channel.
                        anyOf:
                          - type: string
                          - type: 'null'
                    required:
                      - id
                      - masked
                      - modified
                    additionalProperties: false
                    description: Potentially modified content.
                  author:
                    anyOf:
                      - type: object
                        properties:
                          id:
                            type: string
                            description: Author ID in Moderation API
                          external_id:
                            description: The author's ID from your system
                            anyOf:
                              - type: string
                              - type: 'null'
                          block:
                            anyOf:
                              - type: object
                                properties:
                                  until:
                                    description: >-
                                      The timestamp until which they are blocked
                                      if the author is suspended.
                                    anyOf:
                                      - type: number
                                      - type: 'null'
                                  reason:
                                    description: >-
                                      The moderators reason why the author was
                                      blocked or suspended.
                                    anyOf:
                                      - type: string
                                      - type: 'null'
                                additionalProperties: false
                              - type: 'null'
                            description: >-
                              Block or suspension details, if applicable. Null
                              if the author is enabled.
                          status:
                            type: string
                            enum:
                              - enabled
                              - suspended
                              - blocked
                            description: Current author status
                          trust_level:
                            type: object
                            properties:
                              level:
                                type: number
                                description: Author trust level (-1, 0, 1, 2, 3, or 4)
                              manual:
                                type: boolean
                                description: >-
                                  True if the trust level was set manually by a
                                  moderator
                            required:
                              - level
                              - manual
                            additionalProperties: false
                        required:
                          - id
                          - block
                          - status
                          - trust_level
                        additionalProperties: false
                      - type: 'null'
                    description: >-
                      The author of the content if your account has authors
                      enabled. Requires you to send authorId when submitting
                      content.
                  evaluation:
                    type: object
                    properties:
                      flagged:
                        type: boolean
                        description: Whether the content was flagged by any policy.
                      flag_probability:
                        type: number
                        description: The probability that the content should be flagged.
                      severity_score:
                        type: number
                        description: >-
                          The severity score of the content. A higher score
                          indicates more severe content.
                      unicode_spoofed:
                        description: Whether the content was flagged for Unicode spoofing.
                        type: boolean
                      shadow_flagged:
                        description: >-
                          Whether the content would have been flagged by
                          analyze-only policies (flag: false).
                        type: boolean
                    required:
                      - flagged
                      - flag_probability
                      - severity_score
                    additionalProperties: false
                    description: >-
                      The evaluation of the content after running the channel
                      policies.
                  recommendation:
                    type: object
                    properties:
                      action:
                        type: string
                        enum:
                          - review
                          - allow
                          - reject
                        description: The action to take based on the recommendation
                      reason_codes:
                        type: array
                        items:
                          type: string
                          enum:
                            - severity_reject
                            - severity_review
                            - author_block
                            - dry_run
                            - trusted_allow
                            - untrusted_severity
                            - rule_match
                            - rule_default
                            - rule_fallback
                        description: >-
                          The reason code for the recommendation. Can be used to
                          display a reason to the user.
                      matched_rules:
                        description: >-
                          Rules that matched during evaluation, if rules engine
                          is active.
                        type: array
                        items:
                          type: object
                          properties:
                            key:
                              type: string
                            name:
                              type: string
                          required:
                            - key
                            - name
                          additionalProperties: false
                    required:
                      - action
                      - reason_codes
                    additionalProperties: false
                    description: >-
                      The recommendation for the content based on the
                      evaluation.
                  policies:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            id:
                              type: string
                              description: The unique identifier for the classifier output.
                            type:
                              type: string
                              const: classifier
                            probability:
                              type: number
                              minimum: 0
                              maximum: 1
                            flagged:
                              type: boolean
                            flagged_fields:
                              description: >-
                                The keys of the flagged fields if submitting an
                                object.
                              type: array
                              items:
                                type: string
                            labels:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  probability:
                                    type: number
                                    minimum: 0
                                    maximum: 1
                                  flagged:
                                    type: boolean
                                required:
                                  - id
                                  - probability
                                  - flagged
                                additionalProperties: false
                          required:
                            - id
                            - type
                            - probability
                            - flagged
                          additionalProperties: false
                          description: Classifier policy.
                          title: Classifier output
                        - type: object
                          properties:
                            id:
                              type: string
                            type:
                              type: string
                              const: entity_matcher
                            probability:
                              type: number
                              minimum: 0
                              maximum: 1
                            flagged:
                              type: boolean
                            flagged_fields:
                              type: array
                              items:
                                type: string
                            matches:
                              type: array
                              items:
                                type: object
                                properties:
                                  probability:
                                    type: number
                                    minimum: 0
                                    maximum: 1
                                  match:
                                    type: string
                                  span:
                                    minItems: 2
                                    maxItems: 2
                                    type: array
                                    items:
                                      type: integer
                                      minimum: -9007199254740991
                                      maximum: 9007199254740991
                                  reasons:
                                    description: >-
                                      Stable codes explaining why a URL was
                                      flagged (URL Risk only).
                                    type: array
                                    items:
                                      type: string
                                  signals:
                                    description: >-
                                      Observable properties of a URL (URL Risk
                                      only). Absent for allow/block list
                                      matches.
                                    type: object
                                    properties:
                                      brand_impersonation:
                                        anyOf:
                                          - type: object
                                            properties:
                                              brand:
                                                type: string
                                              method:
                                                type: string
                                                enum:
                                                  - registered_domain_token
                                                  - subdomain_token
                                            required:
                                              - brand
                                              - method
                                            additionalProperties: false
                                          - type: 'null'
                                      has_suspicious_characters:
                                        type: boolean
                                      is_link_shortener:
                                        type: boolean
                                      domain_age_days:
                                        anyOf:
                                          - type: integer
                                            minimum: -9007199254740991
                                            maximum: 9007199254740991
                                          - type: 'null'
                                      has_email_setup:
                                        anyOf:
                                          - type: boolean
                                          - type: 'null'
                                      redirect_count:
                                        anyOf:
                                          - type: integer
                                            minimum: -9007199254740991
                                            maximum: 9007199254740991
                                          - type: 'null'
                                      final_url:
                                        anyOf:
                                          - type: string
                                          - type: 'null'
                                      bot_protection:
                                        anyOf:
                                          - type: boolean
                                          - type: 'null'
                                      is_reported:
                                        type: boolean
                                    required:
                                      - brand_impersonation
                                      - has_suspicious_characters
                                      - is_link_shortener
                                      - domain_age_days
                                      - has_email_setup
                                      - redirect_count
                                      - final_url
                                      - bot_protection
                                      - is_reported
                                    additionalProperties: false
                                  entity_type:
                                    description: >-
                                      Sub-type of the entity match — e.g. the
                                      NER key (email, phone, name, …) for PII
                                      matches. Absent for URL Risk and wordlist
                                      matches where the type is already encoded
                                      in the parent label.
                                    type: string
                                required:
                                  - probability
                                  - match
                                  - span
                                additionalProperties: false
                          required:
                            - id
                            - type
                            - probability
                            - flagged
                            - matches
                          additionalProperties: false
                          description: Entity matcher policy.
                          title: Entity matcher output
                      description: Policy output schema.
                      type: object
                    description: >-
                      Results of all policies in the channel. Sorted by highest
                      probability.
                  insights:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            id:
                              type: string
                              const: sentiment
                            type:
                              type: string
                              const: insight
                            probability:
                              type: number
                              minimum: 0
                              maximum: 1
                            value:
                              anyOf:
                                - type: string
                                  enum:
                                    - positive
                                    - neutral
                                    - negative
                                - type: 'null'
                          required:
                            - id
                            - type
                            - probability
                            - value
                          additionalProperties: false
                          description: Sentiment insight
                          title: Sentiment insight
                        - type: object
                          properties:
                            id:
                              type: string
                              const: language
                            type:
                              type: string
                              const: insight
                            probability:
                              type: number
                              minimum: 0
                              maximum: 1
                            value:
                              anyOf:
                                - type: string
                                - type: 'null'
                          required:
                            - id
                            - type
                            - probability
                            - value
                          additionalProperties: false
                          description: Language insight
                          title: Language insight
                      type: object
                    description: Results of all insights enabled in the channel.
                  meta:
                    type: object
                    properties:
                      status:
                        type: string
                        enum:
                          - success
                          - partial_success
                      timestamp:
                        type: number
                      channel_key:
                        type: string
                        description: >-
                          The unique key of the channel where the content was
                          handled. Either the channel provided by you or
                          automatically routed.
                      usage:
                        type: number
                      processing_time:
                        type: string
                    required:
                      - status
                      - timestamp
                      - channel_key
                      - usage
                    additionalProperties: false
                    description: Metadata about the moderation request
                  errors:
                    description: Policies that had errors
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        message:
                          type: string
                      required:
                        - id
                        - message
                      additionalProperties: false
                required:
                  - content
                  - author
                  - evaluation
                  - recommendation
                  - policies
                  - insights
                  - meta
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.UNAUTHORIZED'
        '403':
          description: Insufficient access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.FORBIDDEN'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.INTERNAL_SERVER_ERROR'
      x-codeSamples:
        - lang: JavaScript
          source: >-
            import ModerationAPI from '@moderation-api/sdk';


            const client = new ModerationAPI({
              secretKey: process.env['MODAPI_SECRET_KEY'], // This is the default and can be omitted
            });


            const response = await client.content.submit({ content: { text: 'x',
            type: 'text' } });


            console.log(response.author);
        - lang: Python
          source: |-
            import os
            from moderation_api import ModerationAPI

            client = ModerationAPI(
                secret_key=os.environ.get("MODAPI_SECRET_KEY"),  # This is the default and can be omitted
            )
            response = client.content.submit(
                content={
                    "text": "x",
                    "type": "text",
                },
            )
            print(response.author)
        - lang: Ruby
          source: >-
            require "moderation_api"


            moderation_api = ModerationAPI::Client.new(secret_key: "My Secret
            Key")


            response = moderation_api.content.submit(content: {text: "x", type:
            :text})


            puts(response)
components:
  schemas:
    PublicAuthor:
      type: object
      properties:
        id:
          type: string
          description: Author ID in Moderation API
        external_id:
          description: The author's ID from your system
          anyOf:
            - type: string
            - type: 'null'
        profile_picture:
          description: URL of the author's profile picture
          anyOf:
            - type: string
              format: uri
            - type: 'null'
        external_link:
          description: URL of the author's external profile
          anyOf:
            - type: string
              format: uri
            - type: 'null'
        name:
          description: Author name or identifier
          anyOf:
            - type: string
            - type: 'null'
        email:
          description: Author email address
          anyOf:
            - type: string
              format: email
              pattern: >-
                ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
            - type: 'null'
        company:
          description: The author's company or organization
          anyOf:
            - type: string
            - type: 'null'
        first_seen:
          type: number
          description: Timestamp when author first appeared
        last_seen:
          type: number
          description: Timestamp of last activity
        last_incident:
          description: Timestamp of last incident
          anyOf:
            - type: number
            - type: 'null'
        status:
          type: string
          enum:
            - enabled
            - suspended
            - blocked
          description: Current author status
        trust_level:
          type: object
          properties:
            level:
              type: number
              description: Author trust level (-1, 0, 1, 2, 3, or 4)
            manual:
              type: boolean
              description: True if the trust level was set manually by a moderator
          required:
            - level
            - manual
          additionalProperties: false
        block:
          anyOf:
            - type: object
              properties:
                until:
                  description: >-
                    The timestamp until which they are blocked if the author is
                    suspended.
                  anyOf:
                    - type: number
                    - type: 'null'
                reason:
                  description: >-
                    The moderators reason why the author was blocked or
                    suspended.
                  anyOf:
                    - type: string
                    - type: 'null'
              additionalProperties: false
            - type: 'null'
          description: >-
            Block or suspension details, if applicable. Null if the author is
            enabled.
        risk_evaluation:
          anyOf:
            - type: object
              properties:
                risk_level:
                  description: >-
                    Calculated risk level based on more than 10 behavioral
                    signals.
                  anyOf:
                    - type: number
                      minimum: 0
                      maximum: 100
                    - type: 'null'
              additionalProperties: false
            - type: 'null'
          description: Risk assessment details, if available.
        metrics:
          type: object
          properties:
            total_content:
              type: number
              description: Total pieces of content
            flagged_content:
              type: number
              description: Number of flagged content pieces
            average_sentiment:
              description: >-
                Average sentiment score of content (-1 to 1). Requires a
                sentiment model in your project.
              anyOf:
                - type: number
                - type: 'null'
          required:
            - total_content
            - flagged_content
          additionalProperties: false
        metadata:
          type: object
          properties:
            email_verified:
              description: Whether the author's email is verified
              anyOf:
                - type: boolean
                - type: 'null'
            phone_verified:
              description: Whether the author's phone number is verified
              anyOf:
                - type: boolean
                - type: 'null'
            identity_verified:
              description: Whether the author's identity is verified
              anyOf:
                - type: boolean
                - type: 'null'
            is_paying_customer:
              description: Whether the author is a paying customer
              anyOf:
                - type: boolean
                - type: 'null'
          additionalProperties: {}
          description: >-
            Additional metadata provided by your system. We recommend including
            any relevant information that may assist in the moderation process.
      required:
        - id
        - first_seen
        - last_seen
        - status
        - trust_level
        - block
        - risk_evaluation
        - metrics
        - metadata
      additionalProperties: false
    error.BAD_REQUEST:
      type: object
      properties:
        message:
          type: string
          description: The error message
          example: Invalid input data
        code:
          type: string
          description: The error code
          example: BAD_REQUEST
        issues:
          description: An array of issues that were responsible for the error
          example: []
          type: array
          items:
            type: object
            properties:
              message:
                type: string
            required:
              - message
            additionalProperties: false
      required:
        - message
        - code
      additionalProperties: false
      title: Invalid input data error (400)
      description: The error information
      example:
        code: BAD_REQUEST
        message: Invalid input data
        issues: []
    error.UNAUTHORIZED:
      type: object
      properties:
        message:
          type: string
          description: The error message
          example: Authorization not provided
        code:
          type: string
          description: The error code
          example: UNAUTHORIZED
        issues:
          description: An array of issues that were responsible for the error
          example: []
          type: array
          items:
            type: object
            properties:
              message:
                type: string
            required:
              - message
            additionalProperties: false
      required:
        - message
        - code
      additionalProperties: false
      title: Authorization not provided error (401)
      description: The error information
      example:
        code: UNAUTHORIZED
        message: Authorization not provided
        issues: []
    error.FORBIDDEN:
      type: object
      properties:
        message:
          type: string
          description: The error message
          example: Insufficient access
        code:
          type: string
          description: The error code
          example: FORBIDDEN
        issues:
          description: An array of issues that were responsible for the error
          example: []
          type: array
          items:
            type: object
            properties:
              message:
                type: string
            required:
              - message
            additionalProperties: false
      required:
        - message
        - code
      additionalProperties: false
      title: Insufficient access error (403)
      description: The error information
      example:
        code: FORBIDDEN
        message: Insufficient access
        issues: []
    error.NOT_FOUND:
      type: object
      properties:
        message:
          type: string
          description: The error message
          example: Not found
        code:
          type: string
          description: The error code
          example: NOT_FOUND
        issues:
          description: An array of issues that were responsible for the error
          example: []
          type: array
          items:
            type: object
            properties:
              message:
                type: string
            required:
              - message
            additionalProperties: false
      required:
        - message
        - code
      additionalProperties: false
      title: Not found error (404)
      description: The error information
      example:
        code: NOT_FOUND
        message: Not found
        issues: []
    error.INTERNAL_SERVER_ERROR:
      type: object
      properties:
        message:
          type: string
          description: The error message
          example: Internal server error
        code:
          type: string
          description: The error code
          example: INTERNAL_SERVER_ERROR
        issues:
          description: An array of issues that were responsible for the error
          example: []
          type: array
          items:
            type: object
            properties:
              message:
                type: string
            required:
              - message
            additionalProperties: false
      required:
        - message
        - code
      additionalProperties: false
      title: Internal server error error (500)
      description: The error information
      example:
        code: INTERNAL_SERVER_ERROR
        message: Internal server error
        issues: []
    error.CONFLICT:
      type: object
      properties:
        message:
          type: string
          description: The error message
          example: Action with this key already exists
        code:
          type: string
          description: The error code
          example: CONFLICT
        issues:
          description: An array of issues that were responsible for the error
          example: []
          type: array
          items:
            type: object
            properties:
              message:
                type: string
            required:
              - message
            additionalProperties: false
      required:
        - message
        - code
      additionalProperties: false
      title: Action with this key already exists error (409)
      description: The error information
      example:
        code: CONFLICT
        message: Action with this key already exists
        issues: []
    AuthorBlockedEvent:
      type: object
      properties:
        id:
          type: string
          description: Stable event ID. Use this to dedupe retries.
          example: evt_clxxx...
        type:
          type: string
          const: author.blocked
          description: The event type.
          example: author.blocked
        api_version:
          type: string
          const: v2
          example: v2
        created:
          type: string
          format: date-time
          pattern: >-
            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
          description: ISO 8601 timestamp of when the event was emitted.
        data:
          type: object
          properties:
            object:
              $ref: '#/components/schemas/PublicActionPerformedAuthor'
          required:
            - object
          additionalProperties: false
      required:
        - id
        - type
        - api_version
        - created
        - data
      additionalProperties: false
      example:
        id: evt_clx9f2k0a0001abcd1234
        type: author.blocked
        api_version: v2
        created: '2026-05-08T12:34:56.789Z'
        data:
          object:
            id: act_block_123
            key: block
            name: Block author
            value: null
            created_at: '2026-05-08T12:38:00.000Z'
            author:
              id: auth_555
              external_id: user-555
              profile_picture: null
              external_link: null
              name: Jane Doe
              email: jane@example.com
              company: null
              first_seen: 1746792000000
              last_seen: 1746792000000
              last_incident: null
              status: blocked
              trust_level:
                level: -1
                manual: false
              block:
                until: null
                reason: Repeated spam violations
              risk_evaluation: null
              metrics:
                total_content: 42
                flagged_content: 7
                average_sentiment: -0.1
              metadata: {}
    PublicActionPerformedAuthor:
      type: object
      properties:
        id:
          type: string
          description: Moderation action ID
        key:
          anyOf:
            - type: string
            - type: 'null'
          description: Customer-defined key identifying this action
        name:
          anyOf:
            - type: string
            - type: 'null'
          description: Display name of the action
        value:
          anyOf:
            - type: string
            - type: 'null'
          description: The value passed to the action when it ran
        created_at:
          type: string
