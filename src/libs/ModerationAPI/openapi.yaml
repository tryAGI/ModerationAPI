  /moderate/object:
    post:
      operationId: moderation-object
      summary: Analyze object.
      description: >-
        (Deprecated use https://api.moderationapi.com/v1/moderate) Analyze an
        object with multiple fields including text, images, video, audio. Use to
        moderate a post, a profile, a form submission or anything that have
        multiple fields.
      tags:
        - Moderate
      security:
        - Authorization: []
      deprecated: true
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contentId:
                  description: The unique ID of the content in your database.
                  type: string
                  minLength: 1
                  maxLength: 100
                channelKey:
                  description: The key of the channel.
                  type: string
                doNotStore:
                  description: >-
                    Do not store the content. The content won't enter the review
                    queue
                  type: boolean
                authorId:
                  description: The author of the content.
                  type: string
                contextId:
                  description: For example the ID of a chat room or a post
                  type: string
                metadata:
                  description: Any metadata you want to store with the content
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                value:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - profile
                        - event
                        - product
                        - object
                      description: The type of the object you want to analyze.
                    data:
                      type: object
                      propertyNames:
                        type: string
                      additionalProperties:
                        type: object
                        properties:
                          type:
                            type: string
                            enum:
                              - text
                              - image
                              - video
                              - audio
                            description: >-
                              The type of content (e.g., "text", "image",
                              "video")
                          modelIds:
                            description: Optional array of specific model IDs to use
                            type: array
                            items:
                              type: string
                          value:
                            type: string
                            description: The content to analyze
                        required:
                          - type
                          - value
                  required:
                    - type
                    - data
                  description: The object you want to analyze.
              required:
                - value
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      status:
                        type: string
                        description: Success if the request was successful
                      error:
                        description: Error message if the request failed
                      contentId:
                        description: >-
                          The ID of the content. Only returned if the content
                          was stored.
                        type: string
                      request:
                        type: object
                        properties:
                          timestamp:
                            type: number
                            description: The timestamp of the request
                          quota_usage:
                            type: number
                            description: The quota usage of the request
                        required:
                          - timestamp
                          - quota_usage
                        additionalProperties: false
                        description: Information about the request
                      flagged:
                        type: boolean
                        description: Whether the content was flagged by any models
                      author:
                        anyOf:
                          - type: object
                            properties:
                              id:
                                type: string
                                description: Author ID in Moderation API
                              external_id:
                                description: The author's ID from your system
                                anyOf:
                                  - type: string
                                  - type: 'null'
                              block:
                                anyOf:
                                  - type: object
                                    properties:
                                      until:
                                        description: >-
                                          The timestamp until which they are
                                          blocked if the author is suspended.
                                        anyOf:
                                          - type: number
                                          - type: 'null'
                                      reason:
                                        description: >-
                                          The moderators reason why the author was
                                          blocked or suspended.
                                        anyOf:
                                          - type: string
                                          - type: 'null'
                                    additionalProperties: false
                                  - type: 'null'
                                description: >-
                                  Block or suspension details, if applicable.
                                  Null if the author is enabled.
                              status:
                                type: string
                                enum:
                                  - enabled
                                  - suspended
                                  - blocked
                                description: Current author status
                              trust_level:
                                type: object
                                properties:
                                  level:
                                    type: number
                                    description: Author trust level (-1, 0, 1, 2, 3, or 4)
                                  manual:
                                    type: boolean
                                    description: >-
                                      True if the trust level was set manually
                                      by a moderator
                                required:
                                  - level
                                  - manual
                                additionalProperties: false
                            required:
                              - id
                              - block
                              - status
                              - trust_level
                            additionalProperties: false
                          - type: 'null'
                        description: >-
                          The author of the content if your account has authors
                          enabled. Requires you to send authorId when submitting
                          content.
                      unicode_spoofing:
                        type: boolean
                        description: >-
                          Whether the content is using look-alike characters.
                          Often used by spammers.
                      data_found:
                        type: boolean
                        description: Whether any entity matchers found data for the content
                      labels:
                        type: array
                        items:
                          type: object
                          properties:
                            label:
                              type: string
                              description: The label of the model
                            model:
                              type: string
                              description: The model that found the label
                            score:
                              type: number
                              minimum: 0
                              maximum: 1
                              description: The confidence of the model
                          required:
                            - label
                            - model
                            - score
                          additionalProperties: false
                        description: The scores of each label
                      entities:
                        type: array
                        items:
                          type: object
                          properties:
                            model:
                              type: string
                              description: The model that found the entity
                            matches:
                              type: array
                              items:
                                type: string
                              description: The matches of the entity
                            score:
                              description: The similarity score of the matches
                              type: number
                          required:
                            - model
                            - matches
                          additionalProperties: false
                        description: The entities found in the content
                      wordlists:
                        description: >-
                          The wordlist entity matcher outputs if enabled in your
                          project. Read more at
                          https://docs.moderationapi.com/models/word
                        type: array
                        items:
                          type: object
                          properties:
                            mode:
                              type: string
                              enum:
                                - BLOCK_LIST
                                - REQUIRE_LIST
                                - PASS_LIST
                              description: The flagging mode.
                            found:
                              description: Whether a match was found or not.
                              type: boolean
                            matches:
                              description: The matches of the entity matcher.
                              type: array
                              items:
                                type: string
                            components:
                              description: The components of the matcher.
                            error:
                              description: Indicates an error with the matcher.
                              type: string
                            warning:
                              description: >-
                                Indicates a warning from the model, e.g. if the
                                text is too short or long and the model might
                                not be accurate.
                              type: string
                            flagged:
                              type: boolean
                              description: Whether the wordlists flagged the content.
                            name:
                              type: string
                              description: The name of the wordlist
                            id:
                              type: string
                              description: The ID of the wordlist
                            score:
                              type: number
                              description: The score of the wordlist
                          required:
                            - mode
                            - flagged
                            - name
                            - id
                            - score
                          additionalProperties: false
                      fields:
                        type: array
                        items:
                          type: object
                          properties:
                            key:
                              type: string
                              description: The key of the field
                            flagged:
                              type: boolean
                              description: Whether the field was flagged
                            flagged_by:
                              type: array
                              items:
                                type: string
                              description: The models that flagged the field
                          required:
                            - key
                            - flagged
                            - flagged_by
                          additionalProperties: false
                        description: The fields in the object and their flags
                    required:
                      - status
                      - request
                      - flagged
                      - author
                      - unicode_spoofing
                      - data_found
                      - labels
                      - entities
                      - fields
                    additionalProperties: false
                  - type: object
                    propertyNames:
                      type: string
                    additionalProperties: {}
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.UNAUTHORIZED'
        '403':
          description: Insufficient access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.FORBIDDEN'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.INTERNAL_SERVER_ERROR'
