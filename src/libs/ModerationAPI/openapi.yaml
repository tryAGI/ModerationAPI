openapi: 3.1.0
info:
  title: Moderation API
  description: API for automated content moderation
  version: 1.1.0
servers:
  - url: https://api.moderationapi.com/v1
tags:
  - name: Actions
  - name: Queues
  - name: Webhooks
  - name: Wordlist
  - name: UserReports
externalDocs:
  url: https://docs.moderationapi.com
paths:
  /authors:
    get:
      operationId: author-openListAuthors
      summary: List authors
      description: >-
        Get a paginated list of authors with their activity metrics and
        reputation
      tags:
        - author
      security:
        - Authorization: []
      parameters:
        - in: query
          name: pageSize
          schema:
            default: 20
            description: Number of authors per page
            type: number
        - in: query
          name: pageNumber
          schema:
            default: 1
            description: Page number to fetch
            type: number
        - in: query
          name: sortBy
          schema:
            type: string
            enum:
              - trustLevel
              - violationCount
              - reportCount
              - memberSince
              - lastActive
              - contentCount
              - flaggedContentRatio
              - averageSentiment
        - in: query
          name: sortDirection
          schema:
            default: desc
            description: Sort direction
            type: string
            enum:
              - asc
              - desc
        - in: query
          name: memberSinceDate
          schema:
            type: string
        - in: query
          name: lastActiveDate
          schema:
            type: string
        - in: query
          name: contentTypes
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  authors:
                    type: array
                    items:
                      $ref: '#/components/schemas/PublicAuthor'
                  pagination:
                    type: object
                    properties:
                      total:
                        type: number
                      pageSize:
                        type: number
                      pageNumber:
                        type: number
                      hasNextPage:
                        type: boolean
                      hasPreviousPage:
                        type: boolean
                    required:
                      - total
                      - pageSize
                      - pageNumber
                      - hasNextPage
                      - hasPreviousPage
                    additionalProperties: false
                required:
                  - authors
                  - pagination
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.UNAUTHORIZED'
        '403':
          description: Insufficient access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.FORBIDDEN'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.NOT_FOUND'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.INTERNAL_SERVER_ERROR'
      x-codeSamples:
        - lang: JavaScript
          source: |-
            import ModerationAPI from '@moderation-api/sdk';

            const client = new ModerationAPI({
              secretKey: process.env['MODAPI_SECRET_KEY'], // This is the default and can be omitted
            });

            const authors = await client.authors.list();

            console.log(authors.authors);
        - lang: Python
          source: |-
            import os
            from moderation_api import ModerationAPI

            client = ModerationAPI(
                secret_key=os.environ.get("MODAPI_SECRET_KEY"),  # This is the default and can be omitted
            )
            authors = client.authors.list()
            print(authors.authors)
        - lang: Ruby
          source: >-
            require "moderation_api"


            moderation_api = ModerationAPI::Client.new(secret_key: "My Secret
            Key")


            authors = moderation_api.authors.list


            puts(authors)
    post:
      operationId: author-openCreate
      summary: Create a new author
      description: >-
        Create a new author. Typically not needed as authors are created
        automatically when content is moderated.
      tags:
        - author
      security:
        - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profile_picture:
                  description: URL of the author's profile picture
                  anyOf:
                    - type: string
                      format: uri
                    - type: 'null'
                external_link:
                  description: URL of the author's external profile
                  anyOf:
                    - type: string
                      format: uri
                    - type: 'null'
                name:
                  description: Author name or identifier
                  anyOf:
                    - type: string
                    - type: 'null'
                email:
                  description: Author email address
                  anyOf:
                    - type: string
                      format: email
                      pattern: >-
                        ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                    - type: 'null'
                company:
                  description: The author's company or organization
                  anyOf:
                    - type: string
                    - type: 'null'
                metadata:
                  type: object
                  properties:
                    email_verified:
                      description: Whether the author's email is verified
                      anyOf:
                        - type: boolean
                        - type: 'null'
                    phone_verified:
                      description: Whether the author's phone number is verified
                      anyOf:
                        - type: boolean
                        - type: 'null'
                    identity_verified:
                      description: Whether the author's identity is verified
                      anyOf:
                        - type: boolean
                        - type: 'null'
                    is_paying_customer:
                      description: Whether the author is a paying customer
                      anyOf:
                        - type: boolean
                        - type: 'null'
                  additionalProperties: {}
                  description: >-
                    Additional metadata provided by your system. We recommend
                    including any relevant information that may assist in the
                    moderation process.
                first_seen:
                  type: number
                  description: Timestamp when author first appeared
                last_seen:
                  type: number
                  description: Timestamp of last activity
                manual_trust_level:
                  anyOf:
                    - type: number
                      minimum: -1
                      maximum: 4
                    - type: 'null'
                external_id:
                  type: string
                  description: >-
                    External ID of the user, typically the ID of the author in
                    your database.
              required:
                - external_id
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicAuthor'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.UNAUTHORIZED'
        '403':
          description: Insufficient access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.FORBIDDEN'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.INTERNAL_SERVER_ERROR'
      x-codeSamples:
        - lang: JavaScript
          source: >-
            import ModerationAPI from '@moderation-api/sdk';


            const client = new ModerationAPI({
              secretKey: process.env['MODAPI_SECRET_KEY'], // This is the default and can be omitted
            });


            const author = await client.authors.create({ external_id:
            'external_id' });


            console.log(author.id);
        - lang: Python
          source: |-
            import os
            from moderation_api import ModerationAPI

            client = ModerationAPI(
                secret_key=os.environ.get("MODAPI_SECRET_KEY"),  # This is the default and can be omitted
            )
            author = client.authors.create(
                external_id="external_id",
            )
            print(author.id)
        - lang: Ruby
          source: >-
            require "moderation_api"


            moderation_api = ModerationAPI::Client.new(secret_key: "My Secret
            Key")


            author = moderation_api.authors.create(external_id: "external_id")


            puts(author)
