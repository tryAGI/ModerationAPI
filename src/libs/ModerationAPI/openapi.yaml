  /queue/{id}:
    get:
      operationId: queueView-openGetQueue
      summary: Get a queue
      description: Get a queue
      tags:
        - review-queues
      security:
        - Authorization: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            description: The queue ID
          required: true
          description: The queue ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                      filter:
                        type: object
                        properties:
                          conversationIds:
                            type: array
                            items:
                              anyOf:
                                - type: string
                                - type: 'null'
                          filterLabels:
                            type: array
                            items:
                              type: object
                              properties:
                                label:
                                  type: string
                                type:
                                  type: string
                                  enum:
                                    - FLAGGED
                                    - NOT_FLAGGED
                                    - THRESHOLDS
                                minThreshold:
                                  anyOf:
                                    - type: number
                                      minimum: 0
                                      maximum: 100
                                    - type: 'null'
                                maxThreshold:
                                  anyOf:
                                    - type: number
                                      minimum: 0
                                      maximum: 100
                                    - type: 'null'
                              required:
                                - label
                                - type
                              additionalProperties: false
                          labels:
                            type: array
                            items:
                              type: string
                          afterDate:
                            type: string
                          beforeDate:
                            type: string
                          showChecked:
                            type: boolean
                          authorID:
                            type: string
                          filteredActionIds:
                            type: array
                            items:
                              type: string
                          filteredChannelIds:
                            type: array
                            items:
                              type: string
                          recommendationActions:
                            type: array
                            items:
                              type: string
                              enum:
                                - review
                                - allow
                                - reject
                        additionalProperties: false
                      unresolvedItemsCount:
                        type: number
                      resolvedItemsCount:
                        type: number
                      totalItemsCount:
                        type: number
                    required:
                      - id
                      - name
                      - description
                      - filter
                      - unresolvedItemsCount
                      - resolvedItemsCount
                      - totalItemsCount
                    additionalProperties: false
                required:
                  - queue
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.UNAUTHORIZED'
        '403':
          description: Insufficient access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.FORBIDDEN'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.NOT_FOUND'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.INTERNAL_SERVER_ERROR'
      x-codeSamples:
        - lang: JavaScript
          source: |-
            import ModerationAPI from '@moderation-api/sdk';

            const client = new ModerationAPI({
              secretKey: process.env['MODAPI_SECRET_KEY'], // This is the default and can be omitted
            });

            const queue = await client.queue.retrieve('id');

            console.log(queue.queue);
        - lang: Python
          source: |-
            import os
            from moderation_api import ModerationAPI

            client = ModerationAPI(
                secret_key=os.environ.get("MODAPI_SECRET_KEY"),  # This is the default and can be omitted
            )
            queue = client.queue.retrieve(
                "id",
            )
            print(queue.queue)
        - lang: Ruby
          source: >-
            require "moderation_api"


            moderation_api = ModerationAPI::Client.new(secret_key: "My Secret
            Key")


            queue = moderation_api.queue.retrieve("id")


            puts(queue)
  /queue/{id}/stats:
    get:
      operationId: queueView-openGetStats
      summary: Get queue statistics
      description: >-
        Get detailed statistics about a moderation queue including review times,
        action counts, and trends
      tags:
        - review-queues
      security:
        - Authorization: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            description: The queue ID
          required: true
          description: The queue ID
        - in: query
          name: withinDays
          schema:
            default: '30'
            description: Number of days to analyze statistics for
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviewStats:
                    type: object
                    properties:
                      averageTimeToReview:
                        type: number
                        description: Average time in milliseconds to review an item
                      totalReviewed:
                        type: number
                        description: Total number of items reviewed
                      totalPending:
                        type: number
                        description: Total number of items pending review
                    required:
                      - averageTimeToReview
                      - totalReviewed
                      - totalPending
                    additionalProperties: false
                  actionStats:
                    type: array
                    items:
                      type: object
                      properties:
                        actionId:
                          type: string
                          description: ID of the moderation action
                        actionName:
                          type: string
                          description: Name of the moderation action
                        count:
                          type: number
                          description: Number of times this action was taken
                        percentageOfTotal:
                          type: number
                          description: Percentage this action represents of all actions
                      required:
                        - actionId
                        - actionName
                        - count
                        - percentageOfTotal
                      additionalProperties: false
                  topReviewers:
                    type: array
                    items:
                      type: object
                      properties:
                        userId:
                          type: string
                          description: ID of the reviewer
                        name:
                          type: string
                          description: Name of the reviewer
                        reviewCount:
                          type: number
                          description: Number of items reviewed
                        averageTimePerReview:
                          type: number
                          description: Average review time in milliseconds
                        accuracyScore:
                          description: >-
                            Optional accuracy score based on review quality
                            metrics
                          type: number
                        topActions:
                          type: array
                          items:
                            type: object
                            properties:
                              actionId:
                                type: string
                                description: Most used action by this reviewer
                              actionName:
                                type: string
                                description: Name of the most used action
                              count:
                                type: number
                                description: Number of times this action was used
                            required:
                              - actionId
                              - actionName
                              - count
                            additionalProperties: false
                          description: Most common actions taken by this reviewer
                      required:
                        - userId
                        - name
                        - reviewCount
                        - averageTimePerReview
                        - topActions
                      additionalProperties: false
                    description: List of top reviewers and their statistics
                  trends:
                    type: object
                    properties:
                      dailyReviewCounts:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                              description: Date in YYYY-MM-DD format
                            count:
                              type: number
                              description: Number of reviews on this date
                          required:
                            - date
                            - count
                          additionalProperties: false
                      flaggedContentTrends:
                        type: array
                        items:
                          type: object
                          properties:
                            label:
                              type: string
                              description: Content flag/label
                            trend:
                              type: number
                              description: >-
                                Trend indicator (-1 to 1) showing if this type
                                of flagged content is increasing or decreasing
                          required:
                            - label
                            - trend
                          additionalProperties: false
                    required:
                      - dailyReviewCounts
                      - flaggedContentTrends
                    additionalProperties: false
                required:
                  - reviewStats
                  - actionStats
                  - topReviewers
                  - trends
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.UNAUTHORIZED'
        '403':
          description: Insufficient access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.FORBIDDEN'
        '404':
          description: Not found
          content:
